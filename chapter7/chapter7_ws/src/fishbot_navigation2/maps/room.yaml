image: room.pgm
# image: 指定地图对应的图像文件（通常是 PGM 或 PNG 格式）
#        PGM 是 Portable Graymap Format，一种简单的灰度图像格式，
#        常用于 ROS 地图，因为它只包含一个通道（灰度值），便于解析。
mode: trinary
# mode: 指定地图的表示模式（即如何解释图像中的像素值）
#       可选值有：
#         - "trinary"（三值模式）：每个像素只有三种状态：未知、自由、占据
#         - "scale"（比例模式）：像素灰度值线性映射为 [0.0, 1.0] 的概率
#         - "raw"（原始模式）：直接使用 0～255 的原始灰度值
#
#        为什么用 "trinary"？
#          在大多数导航场景中，我们不需要连续的概率值，
#          而只需要明确知道某区域是：
#            - 可通行（free）
#            - 有障碍（occupied）
#            - 未探索/未知（unknown）
#          这种离散化简化了路径规划和代价地图计算，提高效率。
#          因此，SLAM 工具（如 slam_toolbox、gmapping）默认输出 trinary 模式地图。
resolution: 0.05 #表示图片中的每个像素对应实际物理距离为0.05m
origin: [-10.4, -6.43, 0]
negate: 0 #是否对地图取反，0表示不取反
occupied_thresh: 0.65 # 大于0.65为占据状态

# occupied_thresh: 占据阈值（范围 0.0 ～ 1.0）
#                  当像素的归一化灰度值 >= 此阈值时，视为“占据”（obstacle）
#                  在 trinary 模式下，实际判断逻辑为：
#                    if pixel_value == 0 (黑色) → occupied
#                    if pixel_value == 255 (白色) → free
#                    if pixel_value == 205 (灰色) → unknown
#                  但某些工具或 map_server 会使用阈值做容错处理。
#                  0.65 是经验值，确保只有明显“黑”的区域才被当作障碍。
free_thresh: 0.25 # 小于0.25的为自由状态

# free_thresh: 自由阈值（范围 0.0 ～ 1.0）
#              当像素的归一化灰度值 <= 此阈值时，视为“自由”（free space）
#              同样，在标准 trinary PGM 中：
#                255 → free, 0 → occupied, 205 → unknown
#              设置 free_thresh=0.25 意味着：只有非常“白”的区域才算自由，
#              灰色区域（如 100～200）会被视为 unknown，避免误判。

# 📌 补充说明：为什么需要“三种状态”（trinary）？
#   1. **Free（自由）**：机器人可以安全通过的区域（白色，255）
#   2. **Occupied（占据）**：有障碍物，禁止进入（黑色，0）
#   3. **Unknown（未知）**：激光未扫描到的区域（灰色，通常 205）
#
#   如果只有两种状态（二值地图），未知区域会被强制当作“自由”或“占据”，
#   导致：
#     - 当作“自由” → 机器人可能撞墙（因为以为能走）
#     - 当作“占据” → 无法探索新区域
#
#   三值地图让导航系统知道：“这里我没看过，别乱走”，
#   从而支持 **探索（exploration）** 和 **安全避障**。
#
#   📂 典型 PGM 像素值约定（由 map_server 定义）：
#        - 0   → 黑色 → occupied
#        - 255 → 白色 → free
#        - 205 → 灰色 → unknown
#
#   因此，即使 mode=trinary，YAML 中仍保留 occupied_thresh/free_thresh，
#   是为了兼容非标准图像或提供容错（比如抗 JPEG 压缩噪声）。